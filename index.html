<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia do Viajante 42 - Painel do Agente</title>
    <style>
        /* --- Configurações Globais & Paleta Azul Escuro --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f8fafc;
        }

        .container {
            background-color: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 16px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            transition: max-width 0.3s ease;
        }

        .container.expanded {
            max-width: 550px;
        }

        /* --- Tipografia --- */
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #38bdf8, #0ea5e9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 0.95rem;
            color: #94a3b8;
            text-align: center;
            margin-bottom: 2rem;
        }

        /* --- Formulários e Inputs --- */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .form-grid .form-group {
            margin-bottom: 0.5rem;
        }

        .form-grid .full-width {
            grid-column: span 2;
            margin-bottom: 0.5rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #f8fafc;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }

        /* --- Botões e Links --- */
        button {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 1rem;
            box-shadow: 0 4px 6px -1px rgba(14, 165, 233, 0.2);
        }

        button:hover {
            opacity: 0.95;
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(14, 165, 233, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .toggle-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #94a3b8;
        }

        .toggle-link span {
            color: #38bdf8;
            text-decoration: none;
            cursor: pointer;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .toggle-link span:hover {
            color: #7dd3fc;
            text-decoration: underline;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="container" id="formContainer">
        <h1>Guia do Viajante 42</h1>
        <p class="subtitle" id="formSubtitle">Painel de Agências Parceiras</p>

        <!-- ================= TELA DE LOGIN ================= -->
        <form id="loginForm">
            <div class="form-group">
                <label for="loginUser">Nome de Usuário ou E-mail</label>
                <input type="text" id="loginUser" placeholder="Ex: miraiturismo" required autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="loginPassword">Senha</label>
                <input type="password" id="loginPassword" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <button type="submit">Entrar no Aquário</button>
            
            <div class="toggle-link">
                Não tem acesso? <span id="btnIrParaCadastro">Fazer cadastro</span>
            </div>
        </form>

        <!-- ================= TELA DE CADASTRO ================= -->
        <form id="registerForm" class="hidden">
            <div class="form-grid">
                <div class="form-group full-width">
                    <label for="regNomeEmpresa">Nome da Empresa</label>
                    <input type="text" id="regNomeEmpresa" placeholder="Nome Comercial da Agência" required>
                </div>

                <div class="form-group">
                    <label for="regCNPJ">CNPJ</label>
                    <input type="text" id="regCNPJ" placeholder="00.000.000/0001-00" required>
                </div>

                <div class="form-group">
                    <label for="regWhatsapp">WhatsApp (com DDD)</label>
                    <input type="tel" id="regWhatsapp" placeholder="41999999999" required>
                </div>

                <div class="form-group full-width">
                    <label for="regEmail">E-mail Corporativo</label>
                    <input type="email" id="regEmail" placeholder="contato@suaempresa.com" required autocomplete="email">
                </div>

                <div class="form-group">
                    <label for="regUsername">Nome de Usuário</label>
                    <input type="text" id="regUsername" placeholder="Ex: miraiturismo" required autocomplete="username">
                </div>

                <div class="form-group">
                    <label for="regPassword">Senha de Acesso</label>
                    <input type="password" id="regPassword" placeholder="••••••••" required autocomplete="new-password">
                </div>
            </div>

            <button type="submit">Solicitar Cadastro</button>
            
            <div class="toggle-link">
                Já possui uma conta? <span id="btnIrParaLogin">Fazer login</span>
            </div>
        </form>
    </div>

    <!-- --- Lógica de Interface e Integração Direta com Google Sheets --- -->
    <script>
        const container = document.getElementById('formContainer');
        const subtitle = document.getElementById('formSubtitle');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        
        const btnIrParaCadastro = document.getElementById('btnIrParaCadastro');
        const btnIrParaLogin = document.getElementById('btnIrParaLogin');

        // URL da sua API do Google Apps Script
        const googleScriptURL = 'https://script.google.com/macros/s/AKfycbzWaQtBzagrWw1E8862Sn353qCoJuOBIERCCC2Cfuzk0BFbtvjUhoCllY7K0vkm8a9n/exec';

        // Alternar para tela de Cadastro
        btnIrParaCadastro.addEventListener('click', () => {
            loginForm.classList.add('hidden');
            registerForm.classList.remove('hidden');
            container.classList.add('expanded');
            subtitle.textContent = 'Crie a sua conta para acessar os leads';
        });

        // Alternar para tela de Login
        btnIrParaLogin.addEventListener('click', () => {
            registerForm.classList.add('hidden');
            loginForm.classList.remove('hidden');
            container.classList.remove('expanded');
            subtitle.textContent = 'Painel de Agências Parceiras';
        });

        // Evento de Envio do Cadastro (Direto para o Sheets)
        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();

            // Monta o objeto com os dados dos inputs
            const dadosAgencia = {
                nome_empresa: document.getElementById('regNomeEmpresa').value,
                cnpj: document.getElementById('regCNPJ').value,
                whatsapp: document.getElementById('regWhatsapp').value,
                email: document.getElementById('regEmail').value,
                usuario: document.getElementById('regUsername').value,
                senha: document.getElementById('regPassword').value,
                data_cadastro: new Date().toLocaleString('pt-BR')
            };

            // Trava o botão para evitar cliques duplicados
            const btnSubmit = registerForm.querySelector('button[type="submit"]');
            const textoOriginal = btnSubmit.textContent;
            btnSubmit.textContent = 'Enviando...';
            btnSubmit.disabled = true;

            // Dispara a requisição POST direto para o Google
            fetch(googleScriptURL, {
                method: 'POST',
                mode: 'no-cors', // Evita bloqueios de CORS entre domínios diferentes
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(dadosAgencia)
            })
            .then(() => {
                // Com 'no-cors' o browser não lê a resposta de sucesso, mas o disparo funciona perfeitamente
                alert('Solicitação enviada com sucesso! Analisaremos seu cadastro.');
                registerForm.reset();
                btnIrParaLogin.click(); // Retorna o usuário para a tela de login
            })
            .catch(error => {
                console.error('Erro de envio:', error);
                alert('Ocorreu um erro ao processar seu cadastro. Tente novamente.');
            })
            .finally(() => {
                // Libera o botão novamente
                btnSubmit.textContent = textoOriginal;
                btnSubmit.disabled = false;
            });
        });

        // Interceptação temporária do Login (Próximo passo do projeto)
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            alert('A validação de login será integrada na próxima etapa com o banco de dados!');
        });
    </script>
</body>
</html>
