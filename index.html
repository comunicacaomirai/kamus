<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia do Viajante 42 - Painel em Tempo Real</title>
    <style>
        /* --- Configurações Globais & Paleta Azul Escuro --- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f8fafc;
            padding: 20px;
        }

        .container {
            background-color: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem;
            border-radius: 16px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #38bdf8, #0ea5e9);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 0.95rem;
            color: #94a3b8;
            text-align: center;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: #94a3b8;
            margin-bottom: 0.5rem;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 0.75rem 1rem;
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #f8fafc;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
        }

        button {
            width: 100%;
            padding: 0.75rem;
            background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 1rem;
        }

        button:hover { opacity: 0.95; transform: translateY(-1px); }

        /* ================= TELA DO AQUÁRIO (PAINEL) ================= */
        .painel-container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .painel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
            padding-bottom: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header-meta {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .simulador-box {
            background-color: #1e293b;
            border: 1px dashed #e2e8f0;
            padding: 0.5rem;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .simulador-box label { margin-bottom: 0; color: #f8fafc; }

        .badge-creditos {
            background-color: #0f172a;
            border: 1px solid #38bdf8;
            padding: 0.5rem 1rem;
            border-radius: 30px;
            font-size: 0.95rem;
            font-weight: 600;
            color: #38bdf8;
        }

        .grid-aquario {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }

        /* --- ESTADOS DO CARD --- */
        .card-lead {
            background: linear-gradient(135deg, #064e3b 0%, #022c22 100%);
            border: 2px solid #059669;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            transition: all 0.3s ease;
        }

        .card-lead.atendido {
            background: linear-gradient(135deg, #78350f 0%, #451a03 100%);
            border: 2px solid #d97706;
        }

        .card-lead h3 {
            font-size: 1.3rem;
            color: #34d399;
            border-bottom: 1px solid rgba(52, 211, 153, 0.2);
            padding-bottom: 0.5rem;
        }

        .card-lead.atendido h3 { color: #fbbf24; border-bottom: 1px solid rgba(251, 191, 36, 0.2); }
        .lead-info { font-size: 0.95rem; color: #e2e8f0; }
        .lead-info strong { color: #a7f3d0; }
        .card-lead.atendido .lead-info strong { color: #fde68a; }

        .blur-data {
            filter: blur(5px);
            user-select: none;
            background-color: rgba(255, 255, 255, 0.1);
            display: inline-block;
            border-radius: 4px;
            padding: 0 4px;
        }

        .card-lead.atendido.revelado .blur-data {
            filter: none;
            user-select: text;
            background-color: transparent;
            padding: 0;
        }

        .btn-pescar { background: linear-gradient(135deg, #10b981 0%, #059669 100%); margin-top: 0.5rem;}
        .btn-whatsapp { background: linear-gradient(135deg, #22c55e 0%, #15803d 100%); margin-top: 0.5rem; }
        .btn-inativo { background: #2d1a0f !important; border: 1px solid #78350f; color: #d97706; cursor: not-allowed; margin-top: 0.5rem; opacity: 0.6; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- CONTAINER DE LOGIN SIMPLIFICADO -->
    <div class="container" id="authContainer">
        <h1>Guia do Viajante 42</h1>
        <p class="subtitle">Entrar no Aquário Realtime</p>
        <form id="loginForm">
            <div class="form-group">
                <label for="loginUser">Selecione uma Agência para o teste:</label>
                <select id="loginUser">
                    <option value="ficticia_a">Agência Fictícia A</option>
                    <option value="ficticia_b">Agência Fictícia B</option>
                </select>
            </div>
            <button type="submit">Acessar Painel</button>
        </form>
    </div>

    <!-- TELA DO PAINEL -->
    <div class="painel-container hidden" id="painelAquario">
        <div class="painel-header">
            <div>
                <h1>Aquário de Leads</h1>
                <p style="color: #94a3b8;">Sincronizado via Firebase Realtime ⚡</p>
            </div>
            <div class="header-meta">
                <div class="simulador-box">
                    <label>🏢 Simulando: <strong id="lblAgenciaLogada" style="color:#38bdf8;">-</strong></label>
                </div>
                <div class="badge-creditos">🪙 Créditos da Empresa: <span id="txtCreditos">10</span></div>
                <button id="btnSair" style="width: auto; padding: 0.5rem 1rem; background: #334155; margin: 0;">Sair</button>
            </div>
        </div>

        <div class="grid-aquario" id="aquarioLeads">
            <!-- Os cards serão gerados dinamicamente pelo Firebase aqui dentro -->
        </div>
    </div>

    <!-- Importação dos módulos do Firebase (v10+) via CDN -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Credenciais reais do seu projeto do Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCP2AmKW7NjQrKlfi5Wvx5VY0upEdy8XWo",
            authDomain: "guia-do-viajante-42.firebaseapp.com",
            databaseURL: "https://guia-do-viajante-42-default-rtdb.firebaseio.com",
            projectId: "guia-do-viajante-42",
            storageBucket: "guia-do-viajante-42.firebasestorage.app",
            messagingSenderId: "948399809511",
            appId: "1:948399809511:web:1cf2f183802ad3cc7c5342",
            measurementId: "G-HWP2FC7V67"
        };

        // Inicializa o Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Modelos iniciais com 6 leads no total e controle de créditos puramente local para este teste visual
        const dadosIniciaisIniciais = {
            leads: {
                lead1: { id: "lead1", destino: "Gramado / RS", nome: "Carlos", sobrenome: "Silva", whatsapp: "5541991234567", passageiros: "Casal (2 pessoas)", data: "Julho de 2026", orcamento: "Até R$ 3.000", comprador: "" },
                lead2: { id: "lead2", destino: "Porto de Galinhas / PE", nome: "Mariana", sobrenome: "Costa", whatsapp: "5511987654321", passageiros: "Família (4 pessoas)", data: "Outubro de 2026", orcamento: "Até R$ 7.500", comprador: "" },
                lead3: { id: "lead3", destino: "Paris / França", nome: "Rodrigo", sobrenome: "Almeida", whatsapp: "5521999887766", passageiros: "1 pessoa", data: "Dezembro de 2026", orcamento: "Até R$ 12.000", comprador: "" },
                lead4: { id: "lead4", destino: "Orlando / EUA (Disney)", nome: "Beatriz", sobrenome: "Oliveira", whatsapp: "5531988776655", passageiros: "Família (3 pessoas)", data: "Janeiro de 2027", orcamento: "Até R$ 20.000", comprador: "" },
                lead5: { id: "lead5", destino: "Natal / RN", nome: "Fernando", sobrenome: "Santos", whatsapp: "5581977665544", passageiros: "Casal (2 pessoas)", data: "Novembro de 2026", orcamento: "Até R$ 4.500", comprador: "" },
                lead6: { id: "lead6", destino: "Machu Picchu / Peru", nome: "Camila", sobrenome: "Ribeiro", whatsapp: "5519966554433", passageiros: "Grupo (3 amigos)", data: "Setembro de 2026", orcamento: "Até R$ 6.000", comprador: "" }
            }
        };

        let SampleAgenciaId = "ficticia_a";
        let dadosLocais = {};
        
        // Simulação de créditos local por aba para o teste visual fazer sentido sem o nó global de agências
        let creditosSimulados = {
            ficticia_a: 10,
            ficticia_b: 10
        };

        // Elementos do DOM
        const authContainer = document.getElementById('authContainer');
        const painelAquario = document.getElementById('painelAquario');
        const loginForm = document.getElementById('loginForm');
        const aquarioLeads = document.getElementById('aquarioLeads');
        const txtCreditos = document.getElementById('txtCreditos');
        const lblAgenciaLogada = document.getElementById('lblAgenciaLogada');

        // Login simples para teste de tela
        loginForm.addEventListener('submit', (e) => {
            e.preventDefault();
            SampleAgenciaId = document.getElementById('loginUser').value;
            authContainer.classList.add('hidden');
            painelAquario.classList.remove('hidden');
            
            // Inicia a escuta ativa do Firebase Realtime
            conectarAoFirebase();
        });

        document.getElementById('btnSair').addEventListener('click', () => {
            painelAquario.classList.add('hidden');
            authContainer.classList.remove('hidden');
        });

        function conectarAoFirebase() {
            const dbRef = ref(db, 'guia_viajante_42');

            // Escuta ativa em tempo real
            onValue(dbRef, (snapshot) => {
                const data = snapshot.val();
                
                // Popula o banco com os 6 modelos se estiver zerado
                if (!data || !data.leads) {
                    set(dbRef, dadosIniciaisIniciais);
                    return;
                }

                dadosLocais = data;
                renderizarPainelRealtime();
            });
        }

        function renderizarPainelRealtime() {
            // Atualiza cabeçalho
            lblAgenciaLogada.textContent = SampleAgenciaId === "ficticia_a" ? "Agência Fictícia A" : "Agência Fictícia B";
            txtCreditos.textContent = creditosSimulados[SampleAgenciaId];

            // Limpa o grid de cards
            aquarioLeads.innerHTML = "";

            // Cria os cards dinamicamente
            Object.keys(dadosLocais.leads).forEach(key => {
                const lead = dadosLocais.leads[key];
                const card = document.createElement('div');
                card.className = 'card-lead';
                
                let htmlAcoes = '';

                if (!lead.comprador || lead.comprador === "") {
                    // Estado: Livre para compra (Card Verde)
                    htmlAcoes = `<button class="btn-pescar" data-id="${lead.id}">PESCAR LEAD (1 CRÉDITO)</button>`;
                } else {
                    // Estado: Já pescado (Card Amarelo/Laranja)
                    card.classList.add('atendido');

                    if (lead.comprador === SampleAgenciaId) {
                        // Se você comprou: Revela as informações borradas
                        card.classList.add('revelado');
                        const msg = encodeURIComponent(`Olá ${lead.nome}, recebemos seu pedido de cotação para ${lead.destino} no Guia do Viajante! Vamos planejar?`);
                        htmlAcoes = `<button class="btn-whatsapp" onclick="window.open('https://wa.me/${lead.whatsapp}?text=${msg}', '_blank')">💬 CHAMAR NO WHATSAPP</button>`;
                    } else {
                        // Se outra agência comprou: Bloqueia totalmente
                        htmlAcoes = `<button class="btn-inativo" disabled>⚠️ EM ATENDIMENTO POR OUTRA AGÊNCIA</button>`;
                    }
                }

                card.innerHTML = `
                    <h3>✈️ Destino: ${lead.destino}</h3>
                    <div class="lead-info">👤 <strong>Nome:</strong> ${lead.nome} <span class="blur-data">${lead.sobrenome}</span></div>
                    <div class="lead-info">📱 <strong>WhatsApp:</strong> <span class="blur-data">${lead.whatsapp}</span></div>
                    <div class="lead-info">👥 <strong>Passageiros:</strong> ${lead.passageiros}</div>
                    <div class="lead-info">📅 <strong>Data Prevista:</strong> ${lead.data}</div>
                    <div class="lead-info">💰 <strong>Orçamento Máx:</strong> ${lead.orcamento}</div>
                    <div class="lead-actions">${htmlAcoes}</div>
                `;

                aquarioLeads.appendChild(card);
            });

            // Atribui os eventos de clique
            document.querySelectorAll('.btn-pescar').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idLead = e.target.getAttribute('data-id');
                    pescarLeadNoFirebase(idLead);
                });
            });
        }

        // Grava a pescaria no Firebase
        window.pescarLeadNoFirebase = function(idLead) {
            if (creditosSimulados[SampleAgenciaId] <= 0) {
                alert('Seu saldo fictício de créditos acabou!');
                return;
            }

            // Deduz o crédito localmente na aba de testes
            creditosSimulados[SampleAgenciaId] -= 1;

            const updates = {};
            updates[`guia_viajante_42/leads/${idLead}/comprador`] = SampleAgenciaId;

            // Envia ao servidor
            update(ref(db), updates);
        }
    </script>
</body>
</html>
